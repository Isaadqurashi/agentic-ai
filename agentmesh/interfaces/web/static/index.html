<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agentmesh</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1e252c;
        --muted: #66717d;
        --border: #d9dee5;
        --accent: #176b87;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 28px;
        margin: 0;
        letter-spacing: 0;
      }
      .status {
        color: var(--muted);
        font-size: 14px;
      }
      #log {
        min-height: 55vh;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 14px;
      }
      input, button {
        height: 44px;
        border-radius: 6px;
        font: inherit;
      }
      input {
        border: 1px solid var(--border);
        padding: 0 12px;
      }
      button {
        border: 0;
        background: var(--accent);
        color: white;
        padding: 0 18px;
        cursor: pointer;
      }
      @media (max-width: 640px) {
        form { grid-template-columns: 1fr; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Agentmesh</h1>
        <div class="status">A2A Orchestrator</div>
      </header>
      <section id="log" aria-live="polite"></section>
      <form id="chat-form">
        <input id="message" name="message" autocomplete="off" placeholder="Ask the orchestrator">
        <button type="submit">Send</button>
      </form>
    </main>
    <script>
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message");
      const log = document.querySelector("#log");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        log.textContent += `you: ${text}\n`;
        const source = new EventSource(`/chat?q=${encodeURIComponent(text)}`);
        source.onmessage = (message) => {
          log.textContent += `agentmesh: ${message.data}\n\n`;
          source.close();
        };
        source.onerror = () => {
          log.textContent += "agentmesh: request failed\n\n";
          source.close();
        };
      });
    </script>
  </body>
</html>
